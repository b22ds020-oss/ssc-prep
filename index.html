<main class="view-root fade-in" id="view-root">
  <section id="dashboard-view" class="view-section"></section>

  <section id="folder-view" class="view-section" hidden>
    <div class="folder-shell">
      <div class="folder-toolbar">
        <button class="btn btn-sm" id="backRootBtn">← Root</button>
        <button class="btn btn-sm" id="newFolderBtn">＋ New Folder</button>
        <button class="btn btn-sm" id="newCardBtn">＋ Flashcard</button>
        <button class="btn btn-sm" id="uploadImageBtn">🖼 Image</button>
        <button class="btn btn-sm" id="uploadMindmapBtn">🧠 Mindmap</button>
        <button class="btn btn-sm" id="uploadPdfBtn">📄 PDF</button>
      </div>

      <div id="folderBreadcrumbs" class="folder-breadcrumbs"></div>

      <div class="folder-layout">
        <aside class="folder-tree-panel">
          <div class="panel-head">
            <h2>Folders</h2>
          </div>
          <div id="folderTree"></div>
        </aside>

        <section class="folder-content-panel">
          <div class="panel-head">
            <h2 id="folderTitle">All content</h2>
          </div>

          <div id="folderStats" class="grid grid-4"></div>

          <div class="content-block">
            <h3>Flashcards</h3>
            <div id="flashcardList"></div>
          </div>

          <div class="content-block">
            <h3>Images</h3>
            <div id="imageList"></div>
          </div>

          <div class="content-block">
            <h3>Mindmaps</h3>
            <div id="mindmapList"></div>
          </div>

          <div class="content-block">
            <h3>PDFs</h3>
            <div id="pdfList"></div>
          </div>
        </section>
      </div>
    </div>
  </section>

  <section id="study-view" class="view-section" hidden></section>
  <section id="analytics-view" class="view-section" hidden></section>
  <section id="settings-view" class="view-section" hidden></section>
</main>
